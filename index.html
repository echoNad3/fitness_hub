<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="%BASE_URL%favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%app-icon.svg" sizes="any" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#252730" />
    <meta name="color-scheme" content="dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fitness Hub" />
    <title>Fitness Hub</title>
    <style>
      html,
      body {
        margin: 0;
        background: #252730;
      }
      /* On-brand loading state shown until React mounts, so a cold start fades from the app's dark
         background with a spinner instead of flashing a black screen. Replaced on mount. */
      #app-boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #252730;
      }
      #app-boot .spinner {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.14);
        border-top-color: #6074f3;
        animation: app-boot-spin 0.8s linear infinite;
      }
      @keyframes app-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-boot .spinner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-boot"><div class="spinner"></div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
