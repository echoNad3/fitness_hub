<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="%BASE_URL%favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%app-icon.svg" sizes="any" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#252730" />
    <meta name="color-scheme" content="dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fitness Hub" />
    <title>Fitness Hub</title>
    <style>
      html,
      body {
        margin: 0;
        background: #252730;
      }
      /* On-brand loading state shown until React mounts: the app logo on the app background, so a
         cold start keeps the same picture as the native splash. Replaced on mount. */
      #app-boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #252730;
      }
      #app-boot svg {
        width: 108px;
        animation: app-boot-pulse 1.6s ease-in-out infinite;
      }
      @keyframes app-boot-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.55;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-boot svg {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-boot" aria-hidden="true">
        <svg viewBox="0 0 792 380" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="66" width="112" height="248" rx="32" fill="#F4F5F8" />
          <rect x="130" y="0" width="112" height="380" rx="32" fill="#F4F5F8" />
          <rect x="260" y="134" width="272" height="112" rx="32" fill="#6074F3" />
          <rect x="550" y="0" width="112" height="380" rx="32" fill="#F4F5F8" />
          <rect x="680" y="66" width="112" height="248" rx="32" fill="#F4F5F8" />
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
