name: Build Fitness Hub Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'brand/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'public/**'
      - 'scripts/sync-brand-assets.mjs'
      - '.github/workflows/android.yml'

permissions:
  actions: write
  contents: write

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build and sync Android project
        run: npm run android:sync

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 36 platform
        run: sdkmanager 'platforms;android-36'

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug -PappBuildNumber=${{ github.run_number }}

      - name: Write checksum and release notes
        run: |
          cd android/app/build/outputs/apk/debug
          sha256sum app-debug.apk > app-debug.apk.sha256
          {
            echo "Fitness Hub Android debug build ${{ github.run_number }}."
            echo
            echo "Change: $(git -C ../../../../../.. log -1 --pretty=%s)"
            echo "Commit: ${{ github.sha }}"
            echo
            echo "The SHA-256 file can verify that the APK downloaded without being changed."
          } > android-release-notes.md

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: fitness-hub-debug-apk
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/debug/app-debug.apk.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Publish APK to a release (stable download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ github.run_number }}
          name: Android APK build ${{ github.run_number }}
          make_latest: true
          body_path: android/app/build/outputs/apk/debug/android-release-notes.md
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/debug/app-debug.apk.sha256

      - name: Refresh the deployed Android version metadata
        run: gh workflow run deploy.yml --ref main -f android_build=${{ github.run_number }}
        env:
          GH_TOKEN: ${{ github.token }}
