# Free-tier Supabase pauses a project after 7 days without API activity.
# This queries the database twice a week so that never happens.
#
# The URL and key are the same public-safe values the app ships in src/cloudConfig.ts:
# Row Level Security protects the data, so an anonymous request returns no rows —
# but it still counts as activity.
#
# Note: GitHub suspends scheduled workflows in repos with no commits for 60 days
# (it emails a warning first; one click re-enables). Any push also resets that clock.

name: Keep Supabase active

on:
  schedule:
    - cron: '43 4 * * 1,4' # Mondays and Thursdays, 04:43 UTC
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/keepalive.yml'

permissions: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query the database through the REST API
        run: |
          url='https://jrsowjbxenkrmzzknnab.supabase.co/rest/v1/app_state?select=user_id&limit=1'
          key='sb_publishable_Gc5rYVcaimTXhAcy4tSwdg_Kk0SlyHJ'
          status=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "apikey: $key" -H "Authorization: Bearer $key" "$url")
          echo "Supabase answered HTTP $status"
          test "$status" = '200' || test "$status" = '206'
