name: Deploy Fitness Hub to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      android_build:
        description: Android build that must be visible before deployment
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write Android release metadata
        run: node scripts/write-android-release-manifest.mjs
        env:
          ANDROID_BUILD: ${{ inputs.android_build }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Build site
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
